license.workspace = true

[[bin]]
name = "qit"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
axum = { workspace = true }
clap = { version = "4.5", features = ["derive"] }
rand = { workspace = true }
qit-domain = { path = "../crates/qit-domain" }
