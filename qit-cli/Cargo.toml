qit-http = { path = "../crates/qit-http" }
qit-storage = { path = "../crates/qit-storage" }
qit-transports = { path = "../crates/qit-transports" }
tempfile = { workspace = true }
tokio = { workspace = true }
tracing-subscriber = { workspace = true }
url = { workspace = true }
