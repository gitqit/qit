name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build workspace
        run: cargo build --workspace --all-targets
      - name: Test workspace
        run: cargo test --workspace
      - name: Build qit workspace
        run: cargo build --manifest-path qit-cli/Cargo.toml --workspace --all-targets
      - name: Test qit workspace
        run: cargo test --manifest-path qit-cli/Cargo.toml --workspace
