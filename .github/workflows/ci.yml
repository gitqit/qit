name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  web:
    name: Web Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            crates/qit-webui/frontend/package-lock.json
            landing/package-lock.json
      - name: Install Web UI frontend dependencies
        working-directory: crates/qit-webui/frontend
        run: npm ci
      - name: Lint Web UI frontend
        working-directory: crates/qit-webui/frontend
        run: npm run lint
      - name: Test Web UI frontend
        working-directory: crates/qit-webui/frontend
        run: npm run test
      - name: Build Web UI frontend
        working-directory: crates/qit-webui/frontend
        run: npm run build
      - name: Install landing dependencies
        working-directory: landing
        run: npm ci
      - name: Lint landing site
        working-directory: landing
        run: npm run lint
      - name: Build landing site
        working-directory: landing
        run: npm run build

  web-smoke:
    name: Web Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crates/qit-webui/frontend/package-lock.json
      - name: Install Web UI frontend dependencies
        working-directory: crates/qit-webui/frontend
        run: npm ci
      - name: Install Playwright browser
        working-directory: crates/qit-webui/frontend
        run: npx playwright install --with-deps chromium
      - name: Run frontend browser smoke tests
        working-directory: crates/qit-webui/frontend
        run: npm run smoke

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crates/qit-webui/frontend/package-lock.json
      - name: Install Web UI frontend dependencies
        working-directory: crates/qit-webui/frontend
        run: npm ci
      - name: Build Web UI frontend bundle
        working-directory: crates/qit-webui/frontend
        run: npm run build
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Lint workspace
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-latest
          - name: linux-arm64
            runner: ubuntu-24.04-arm
          - name: windows-x64
            runner: windows-latest
          - name: windows-arm64
            runner: windows-11-arm
          - name: macos-arm64
            runner: macos-latest
          - name: macos-x64
            runner: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crates/qit-webui/frontend/package-lock.json
      - name: Install Web UI frontend dependencies
        working-directory: crates/qit-webui/frontend
        run: npm ci
      - name: Build Web UI frontend bundle
        working-directory: crates/qit-webui/frontend
        run: npm run build
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build workspace
        run: cargo build --workspace --all-targets --locked

  test:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-latest
          - name: linux-arm64
            runner: ubuntu-24.04-arm
          - name: windows-x64
            runner: windows-latest
          - name: windows-arm64
            runner: windows-11-arm
          - name: macos-arm64
            runner: macos-latest
          - name: macos-x64
            runner: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crates/qit-webui/frontend/package-lock.json
      - name: Install Web UI frontend dependencies
        working-directory: crates/qit-webui/frontend
        run: npm ci
      - name: Build Web UI frontend bundle
        working-directory: crates/qit-webui/frontend
        run: npm run build
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test workspace
        run: cargo test --workspace --all-targets --locked

  release-build:
    name: Release build (${{ matrix.name }})
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-latest
            platform: linux
            archive_extension: tar.gz
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            platform: linux
            archive_extension: tar.gz
          - name: macos-arm64
            runner: macos-latest
            platform: macos
            archive_extension: tar.gz
          - name: macos-x64
            runner: macos-15-intel
            platform: macos
            archive_extension: tar.gz
          - name: windows-x64
            runner: windows-latest
            platform: windows
            archive_extension: zip
          - name: windows-arm64
            runner: windows-11-arm
            platform: windows
            archive_extension: zip
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crates/qit-webui/frontend/package-lock.json
      - name: Install Web UI frontend dependencies
        working-directory: crates/qit-webui/frontend
        run: npm ci
      - name: Build Web UI frontend bundle
        working-directory: crates/qit-webui/frontend
        run: npm run build
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --locked -p qit
      - name: Package Unix release artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          artifact_name="qit-ci-${{ matrix.platform }}-${{ runner.arch }}"
          mkdir -p dist
          cp target/release/qit dist/qit
          tar -C dist -czf "dist/${artifact_name}.${{ matrix.archive_extension }}" qit
          shasum -a 256 "dist/${artifact_name}.${{ matrix.archive_extension }}" > "dist/${artifact_name}.${{ matrix.archive_extension }}.sha256"
          rm dist/qit
      - name: Package Windows release artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifactName = "qit-ci-${{ matrix.platform }}-${{ runner.arch }}"
          $archivePath = "dist/$artifactName.${{ matrix.archive_extension }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/release/qit.exe" "dist/qit.exe"
          Compress-Archive -Path "dist/qit.exe" -DestinationPath $archivePath
          $hash = (Get-FileHash -Algorithm SHA256 $archivePath).Hash.ToLower()
          Set-Content -Path "$archivePath.sha256" -Value "$hash *$artifactName.${{ matrix.archive_extension }}"
          Remove-Item "dist/qit.exe"
