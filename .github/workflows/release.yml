name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-tag:
    name: Verify release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure tag commit is on main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - name: Ensure tag matches workspace version
        id: version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          workspace_version="$(python3 - <<'PY'
          import tomllib
          with open("Cargo.toml", "rb") as fh:
              cargo = tomllib.load(fh)
          print(cargo["workspace"]["package"]["version"])
          PY
          )"

          if [[ "$tag_version" != "$workspace_version" ]]; then
            echo "Tag version ($tag_version) does not match workspace version ($workspace_version)." >&2
            exit 1
          fi

          echo "version=$workspace_version" >> "$GITHUB_OUTPUT"

  preflight:
    name: Preflight checks
    needs: verify-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Lint workspace
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Test workspace
        run: cargo test --workspace --all-targets --locked

  build-artifacts:
    name: Build release (${{ matrix.os }})
    needs: [verify-tag, preflight]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            archive_extension: tar.gz
          - os: macos-latest
            platform: macos
            archive_extension: tar.gz
          - os: windows-latest
            platform: windows
            archive_extension: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --locked -p qit
      - name: Package Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          artifact_name="qit-v${{ needs.verify-tag.outputs.version }}-${{ matrix.platform }}-${{ runner.arch }}"
          mkdir -p dist
          cp target/release/qit dist/qit
          tar -C dist -czf "dist/${artifact_name}.${{ matrix.archive_extension }}" qit
      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifactName = "qit-v${{ needs.verify-tag.outputs.version }}-${{ matrix.platform }}-${{ runner.arch }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/release/qit.exe" "dist/qit.exe"
          Compress-Archive -Path "dist/qit.exe" -DestinationPath "dist/$artifactName.${{ matrix.archive_extension }}"
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: dist/*.${{ matrix.archive_extension }}
          if-no-files-found: error

  github-release:
    name: Publish GitHub release
    needs: [verify-tag, build-artifacts]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
