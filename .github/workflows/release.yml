name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify-tag:
    name: Verify release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure tag commit is on main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - name: Ensure tag matches workspace version
        id: version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          workspace_version="$(python3 - <<'PY'
          import tomllib
          with open("Cargo.toml", "rb") as fh:
              cargo = tomllib.load(fh)
          print(cargo["workspace"]["package"]["version"])
          PY
          )"

          if [[ "$tag_version" != "$workspace_version" ]]; then
            echo "Tag version ($tag_version) does not match workspace version ($workspace_version)." >&2
            exit 1
          fi

          echo "version=$workspace_version" >> "$GITHUB_OUTPUT"

  create-release:
    name: Create draft release
    needs: verify-tag
    runs-on: ubuntu-latest
    steps:
      - name: Create or reset GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --draft=true --title "$GITHUB_REF_NAME"
          else
            gh release create "$GITHUB_REF_NAME" --draft --generate-notes --title "$GITHUB_REF_NAME"
          fi

  build-artifacts:
    name: Build release (${{ matrix.name }})
    needs: [verify-tag, create-release]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-latest
            platform: linux
            archive_extension: tar.gz
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            platform: linux
            archive_extension: tar.gz
          - name: macos-arm64
            runner: macos-latest
            platform: macos
            archive_extension: tar.gz
          - name: macos-x64
            runner: macos-15-intel
            platform: macos
            archive_extension: tar.gz
          - name: windows-x64
            runner: windows-latest
            platform: windows
            archive_extension: zip
          - name: windows-arm64
            runner: windows-11-arm
            platform: windows
            archive_extension: zip
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crates/qit-webui/frontend/package-lock.json
      - name: Install Web UI frontend dependencies
        working-directory: crates/qit-webui/frontend
        run: npm ci
      - name: Build Web UI frontend bundle
        working-directory: crates/qit-webui/frontend
        run: npm run build
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --locked -p qit
      - name: Package Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          artifact_name="qit-v${{ needs.verify-tag.outputs.version }}-${{ matrix.platform }}-${{ runner.arch }}"
          mkdir -p dist
          cp target/release/qit dist/qit
          tar -C dist -czf "dist/${artifact_name}.${{ matrix.archive_extension }}" qit
          shasum -a 256 "dist/${artifact_name}.${{ matrix.archive_extension }}" > "dist/${artifact_name}.${{ matrix.archive_extension }}.sha256"
          rm dist/qit
      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifactName = "qit-v${{ needs.verify-tag.outputs.version }}-${{ matrix.platform }}-${{ runner.arch }}"
          $archivePath = "dist/$artifactName.${{ matrix.archive_extension }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/release/qit.exe" "dist/qit.exe"
          Compress-Archive -Path "dist/qit.exe" -DestinationPath $archivePath
          $hash = (Get-FileHash -Algorithm SHA256 $archivePath).Hash.ToLower()
          Set-Content -Path "$archivePath.sha256" -Value "$hash *$artifactName.${{ matrix.archive_extension }}"
          Remove-Item "dist/qit.exe"
      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: gh release upload "$GITHUB_REF_NAME" dist/* --clobber

  publish-release:
    name: Publish GitHub release
    needs: [verify-tag, build-artifacts]
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false

  update-homebrew-tap:
    name: Update Homebrew tap
    needs: [verify-tag, publish-release]
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate tap settings
        shell: bash
        run: |
          if [[ -z "$HOMEBREW_TAP_REPOSITORY" ]]; then
            echo "Set the HOMEBREW_TAP_REPOSITORY repository variable (for example, flynnemon/homebrew-qit)." >&2
            exit 1
          fi

          if [[ -z "${{ secrets.HOMEBREW_TAP_TOKEN }}" ]]; then
            echo "Set the HOMEBREW_TAP_TOKEN repository secret with contents:write access to the tap repository." >&2
            exit 1
          fi
      - name: Download release checksum assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          mkdir -p dist
          gh release download "$GITHUB_REF_NAME" --pattern "*.sha256" --dir dist
      - name: Render Homebrew formula
        env:
          VERSION: ${{ needs.verify-tag.outputs.version }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          linux_x64_sha="$(awk 'NR==1 { print $1 }' "dist/qit-v${VERSION}-linux-X64.tar.gz.sha256")"
          linux_arm64_sha="$(awk 'NR==1 { print $1 }' "dist/qit-v${VERSION}-linux-ARM64.tar.gz.sha256")"
          macos_x64_sha="$(awk 'NR==1 { print $1 }' "dist/qit-v${VERSION}-macos-X64.tar.gz.sha256")"
          macos_arm64_sha="$(awk 'NR==1 { print $1 }' "dist/qit-v${VERSION}-macos-ARM64.tar.gz.sha256")"

          export VERSION REPOSITORY
          export LINUX_X64_SHA="$linux_x64_sha"
          export LINUX_ARM64_SHA="$linux_arm64_sha"
          export MACOS_X64_SHA="$macos_x64_sha"
          export MACOS_ARM64_SHA="$macos_arm64_sha"

          python3 - <<'PY'
          import os
          from pathlib import Path

          template_path = Path("packaging/homebrew/qit.rb.template")
          rendered_path = Path("dist/qit.rb")
          content = template_path.read_text()

          for key in (
              "VERSION",
              "REPOSITORY",
              "LINUX_X64_SHA",
              "LINUX_ARM64_SHA",
              "MACOS_X64_SHA",
              "MACOS_ARM64_SHA",
          ):
              content = content.replace(f"__{key}__", os.environ[key])

          if "__" in content:
              raise SystemExit("Homebrew formula template still contains unreplaced placeholders.")

          rendered_path.write_text(content)
          PY
      - name: Validate Homebrew formula syntax
        run: ruby -c dist/qit.rb
      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HOMEBREW_TAP_REPOSITORY }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
      - name: Update tap formula
        env:
          VERSION: ${{ needs.verify-tag.outputs.version }}
        shell: bash
        run: |
          mkdir -p homebrew-tap/Formula
          cp dist/qit.rb homebrew-tap/Formula/qit.rb

          cd homebrew-tap

          if git diff --quiet -- Formula/qit.rb; then
            echo "Homebrew formula already matches v${VERSION}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/qit.rb
          git commit -m "Update qit formula to v${VERSION}"
          git push
